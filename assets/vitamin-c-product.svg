<svg viewBox="0 0 200 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Bottle base -->
  <defs>
    <linearGradient id="bottleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8d498;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5e6b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9c98a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Glass liquid -->
  <ellipse cx="100" cy="180" rx="45" ry="8" fill="url(#liquidGradient)" opacity="0.7"/>
  <path d="M 55 180 L 60 260 Q 60 285 85 290 L 115 290 Q 140 285 140 260 L 145 180" fill="url(#liquidGradient)" opacity="0.85"/>
  
  <!-- Glass bottle -->
  <path d="M 55 180 Q 50 150 55 120 L 65 60 Q 65 50 75 50 L 125 50 Q 135 50 135 60 L 145 120 Q 150 150 145 180" fill="url(#bottleGradient)" opacity="0.9" stroke="#cccccc" stroke-width="1"/>
  
  <!-- Bottle shine/reflection -->
  <ellipse cx="75" cy="100" rx="8" ry="30" fill="white" opacity="0.4"/>
  
  <!-- Cap -->
  <rect x="80" y="35" width="40" height="20" rx="2" fill="#c0c0c0" stroke="#888888" stroke-width="1"/>
  <rect x="78" y="30" width="44" height="8" rx="2" fill="#d9d9d9" stroke="#999999" stroke-width="0.5"/>
  
  <!-- Label background -->
  <rect x="65" y="200" width="70" height="60" fill="white" opacity="0.95" rx="2"/>
  
  <!-- Label text -->
  <text x="100" y="225" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">VITAMIN C</text>
  <text x="100" y="250" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333333">FOR INTRAVENOUS</text>
  <text x="100" y="260" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333333">5ml STERILE VIAL</text>
</svg>
