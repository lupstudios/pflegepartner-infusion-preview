<svg viewBox="0 0 300 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bodyGradient">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:0.05"/>
    </radialGradient>
  </defs>

  <!-- Body silhouette background -->
  <ellipse cx="150" cy="200" rx="55" ry="140" fill="url(#bodyGradient)"/>

  <!-- VASCULAR SYSTEM - Cyan with glow -->
  <g id="vascular" opacity="0.85">
    <!-- Main artery -->
    <path d="M 150 70 Q 150 150 148 250 Q 147 350 145 450" stroke="#00D9FF" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>

    <!-- Heart area -->
    <circle cx="150" cy="140" r="18" fill="none" stroke="#00D9FF" stroke-width="3" filter="url(#glowCyan)" opacity="0.9"/>
    <path d="M 140 140 Q 135 130 140 125" stroke="#00D9FF" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 160 140 Q 165 130 160 125" stroke="#00D9FF" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Upper body vessels -->
    <path d="M 150 100 Q 120 120 100 150" stroke="#00D9FF" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>
    <path d="M 150 100 Q 180 120 200 150" stroke="#00D9FF" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>

    <!-- Left arm vessels -->
    <path d="M 100 150 Q 70 180 60 230" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.7" filter="url(#glowCyan)"/>
    <path d="M 100 150 Q 80 160 65 190" stroke="#00D9FF" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Right arm vessels -->
    <path d="M 200 150 Q 230 180 240 230" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.7" filter="url(#glowCyan)"/>
    <path d="M 200 150 Q 220 160 235 190" stroke="#00D9FF" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Abdominal vessels -->
    <path d="M 150 200 Q 130 220 115 280" stroke="#00D9FF" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>
    <path d="M 150 200 Q 170 220 185 280" stroke="#00D9FF" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>

    <!-- Lower body vessels -->
    <path d="M 145 320 Q 130 370 120 450" stroke="#00D9FF" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>
    <path d="M 155 320 Q 170 370 180 450" stroke="#00D9FF" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glowCyan)"/>

    <!-- Capillary networks -->
    <path d="M 100 160 L 85 175 M 100 160 L 90 165" stroke="#00D9FF" stroke-width="0.8" opacity="0.5"/>
    <path d="M 200 160 L 215 175 M 200 160 L 210 165" stroke="#00D9FF" stroke-width="0.8" opacity="0.5"/>
    <path d="M 125 240 L 105 255 M 125 240 L 110 250" stroke="#00D9FF" stroke-width="0.8" opacity="0.5"/>
    <path d="M 175 240 L 195 255 M 175 240 L 190 250" stroke="#00D9FF" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- NERVOUS SYSTEM - Cyan network detail -->
  <g id="nervous-network" opacity="0.6">
    <!-- Brain outline -->
    <ellipse cx="150" cy="65" rx="28" ry="32" fill="none" stroke="#00D9FF" stroke-width="2" filter="url(#glowCyan)"/>

    <!-- Neural branching from brain -->
    <path d="M 135 85 Q 125 100 120 120" stroke="#00D9FF" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 150 97 Q 150 110 148 130" stroke="#00D9FF" stroke-width="1.5" fill="none" opacity="0.8"/>
    <path d="M 165 85 Q 175 100 180 120" stroke="#00D9FF" stroke-width="1" fill="none" opacity="0.7"/>

    <!-- Nerve plexuses -->
    <circle cx="150" cy="140" r="12" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
    <circle cx="150" cy="220" r="15" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
    <circle cx="150" cy="320" r="14" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- SPINAL CORD - Golden/Orange prominent -->
  <g id="spinal-cord">
    <!-- Main spinal cord -->
    <path d="M 150 90 Q 151 200 150 420" stroke="#FFB84D" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glowGold)"/>

    <!-- Spinal segments -->
    <circle cx="150" cy="110" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
    <circle cx="150" cy="140" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
    <circle cx="150" cy="170" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
    <circle cx="150" cy="205" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
    <circle cx="150" cy="240" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
    <circle cx="150" cy="280" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
    <circle cx="150" cy="330" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
    <circle cx="150" cy="380" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
    <circle cx="150" cy="420" r="3" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>

    <!-- Spinal nerve branches -->
    <line x1="150" y1="110" x2="120" y2="105" stroke="#FFB84D" stroke-width="1.5" opacity="0.7"/>
    <line x1="150" y1="110" x2="180" y2="105" stroke="#FFB84D" stroke-width="1.5" opacity="0.7"/>

    <line x1="150" y1="205" x2="110" y2="210" stroke="#FFB84D" stroke-width="1.5" opacity="0.7"/>
    <line x1="150" y1="205" x2="190" y2="210" stroke="#FFB84D" stroke-width="1.5" opacity="0.7"/>

    <line x1="150" y1="330" x2="115" y2="350" stroke="#FFB84D" stroke-width="1.5" opacity="0.7"/>
    <line x1="150" y1="330" x2="185" y2="350" stroke="#FFB84D" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Subtle network connections -->
  <g id="connections" opacity="0.3">
    <path d="M 120 150 Q 135 180 150 200" stroke="#00D9FF" stroke-width="0.8" fill="none"/>
    <path d="M 180 150 Q 165 180 150 200" stroke="#00D9FF" stroke-width="0.8" fill="none"/>
    <path d="M 130 280 Q 140 310 150 330" stroke="#00D9FF" stroke-width="0.8" fill="none"/>
    <path d="M 170 280 Q 160 310 150 330" stroke="#00D9FF" stroke-width="0.8" fill="none"/>
  </g>
</svg>
